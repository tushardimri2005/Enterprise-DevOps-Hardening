- name: Validate SSH configuration
  command: sshd -t
  changed_when: false

- name: Verify root login disabled
  shell: grep "^PermitRootLogin" /etc/ssh/sshd_config
  register: root_login_check
  changed_when: false

- name: Verify password authentication disabled
  shell: grep "^PasswordAuthentication" /etc/ssh/sshd_config
  register: password_auth_check
  changed_when: false

- name: Display SSH hardening status
  debug:
    msg:
      - "Root Login Setting: {{ root_login_check.stdout }}"
      - "Password Authentication Setting: {{ password_auth_check.stdout }}"

- name: Flush handlers
  meta: flush_handlers