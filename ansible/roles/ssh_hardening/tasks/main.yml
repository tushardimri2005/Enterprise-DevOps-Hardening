---
- name: Disable root SSH login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: "PermitRootLogin {{ ssh_root_login }}"
    backup: yes
  notify: restart ssh

- name: Disable password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: "PasswordAuthentication {{ ssh_password_authentication }}"
    backup: yes
  notify: restart ssh

- name: Configure SSH timeout
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ClientAliveInterval'
    line: "ClientAliveInterval {{ ssh_client_alive_interval }}"
    backup: yes
  notify: restart ssh

- name: Configure SSH count max
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ClientAliveCountMax'
    line: "ClientAliveCountMax {{ ssh_client_alive_count_max }}"
    backup: yes
  notify: restart ssh

- name: Validate SSH configuration
  command: sshd -t
  changed_when: false

- name: Flush handlers
  meta: flush_handlers